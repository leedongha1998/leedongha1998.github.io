<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>usertable</title>

    <style>
      table {
        border: 1px solid black;
        border-collapse: collapse;
        margin: 10px 0;
      }
      th,
      td {
        border: 1px solid black;
        padding: 5px;
      }
      a {
        text-decoration: none;
      }
    </style>
    <link rel="stylesheet" href="nav.css" />
  </head>
  <body onload="renderUserinfo()">
    <nav>
      <a href="./index.html">홈</a>
    </nav>
    <h1>회원</h1>
    <table>
      <thead>
        <tr>
          <th>no</th>
          <th>아이디</th>
          <th>이름</th>
          <th>생일</th>
          <th>성별</th>
          <th>이메일</th>
          <th>핸드폰</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script>
      const renderUserinfo = (
        infos = JSON.parse(localStorage.getItem("infos"))
      ) => {
        console.log(infos[0]);
        if (!infos) return;
        const tbody = document.querySelector("tbody");
        tbody.innerHTML = "";
        infos
          .map((infos, index) => {
            return `<tr>
                  <td>${index + 1}</td>
                  <td>${infos.userid}</td>
                  <td>${infos.username}</td>
                  <td>${infos.birth}</td>
                  <td>${infos.gender}</td>
                  <td>${infos.email}</td>
                  <td>${infos.phone}</td>
                <tr/>`;
          })
          .forEach((tr) => {
            tbody.innerHTML += tr;
          });
      };
    </script>
  </body>
</html>
